<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 24px 24px 20px;
    }

    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header .stats {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #4f46e5; }

    .btn-add {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover { background: #4338ca; }
    .btn-add:active { background: #3730a3; }

    .filter-bar {
      display: flex;
      gap: 0;
      padding: 12px 20px 8px;
    }
    .filter-btn {
      flex: 1;
      background: none;
      border: 1.5px solid #e5e7eb;
      padding: 6px 0;
      font-size: 0.82rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.15s;
    }
    .filter-btn:first-child { border-radius: 6px 0 0 6px; }
    .filter-btn:last-child  { border-radius: 0 6px 6px 0; }
    .filter-btn + .filter-btn { border-left: none; }
    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .empty-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.1s;
      animation: fadeIn 0.2s ease;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #f9fafb; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-check {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }
    .item-check:checked {
      background: #4f46e5;
      border-color: #4f46e5;
    }
    .item-check:checked::after {
      content: '';
      position: absolute;
      top: 3px; left: 5px;
      width: 6px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      word-break: break-all;
      transition: all 0.2s;
    }
    .item.done .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.1rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .btn-delete:hover { color: #ef4444; background: #fee2e2; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
    }
    .footer span { font-size: 0.82rem; color: #6b7280; }
    .btn-clear {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .btn-clear:hover { background: #fee2e2; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>쇼핑 리스트</h1>
    <div class="stats" id="stats">0개 항목</div>
  </div>

  <div class="input-area">
    <input type="text" id="newItem" placeholder="항목 추가..." maxlength="80">
    <button class="btn-add" onclick="addItem()">추가</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all"    onclick="setFilter('all')">전체</button>
    <button class="filter-btn"        data-filter="active" onclick="setFilter('active')">미완료</button>
    <button class="filter-btn"        data-filter="done"   onclick="setFilter('done')">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span id="footerInfo"></span>
    <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');
  let filter = 'all';
  let nextId = items.length ? Math.max(...items.map(i => i.id)) + 1 : 1;

  const input  = document.getElementById('newItem');
  const list   = document.getElementById('list');
  const stats  = document.getElementById('stats');
  const footer = document.getElementById('footerInfo');

  function save() {
    localStorage.setItem('shoppingList', JSON.stringify(items));
  }

  function addItem() {
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    items.unshift({ id: nextId++, text, done: false });
    input.value = '';
    input.focus();
    save();
    render();
  }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.done = !item.done; save(); render(); }
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearDone() {
    items = items.filter(i => !i.done);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  }

  function render() {
    const total  = items.length;
    const doneN  = items.filter(i => i.done).length;
    const activeN = total - doneN;

    stats.textContent = `${total}개 항목 · 완료 ${doneN}개`;
    footer.textContent = `미완료 ${activeN}개`;

    const visible = items.filter(i => {
      if (filter === 'active') return !i.done;
      if (filter === 'done')   return  i.done;
      return true;
    });

    if (visible.length === 0) {
      list.innerHTML = `<li class="empty-msg">${
        filter === 'done'   ? '완료된 항목이 없습니다.' :
        filter === 'active' ? '미완료 항목이 없습니다.' :
                              '항목을 추가해 보세요!'
      }</li>`;
      return;
    }

    list.innerHTML = visible.map(item => `
      <li class="item${item.done ? ' done' : ''}" data-id="${item.id}">
        <input class="item-check" type="checkbox" ${item.done ? 'checked' : ''}
               onchange="toggleItem(${item.id})">
        <span class="item-text">${escHtml(item.text)}</span>
        <button class="btn-delete" onclick="deleteItem(${item.id})" title="삭제">✕</button>
      </li>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  render();
</script>
</body>
</html>

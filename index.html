<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px 20px;
      color: #fff;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .stats {
      font-size: 13px;
      opacity: 0.85;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    .input-area button:hover { background: #5a6fd6; }
    .input-area button:active { transform: scale(0.95); }

    .filters {
      display: flex;
      gap: 8px;
      padding: 14px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-btn {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      cursor: pointer;
      color: #64748b;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 80px;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 14px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: #f8fafc; }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 15px;
      color: #1a202c;
      word-break: break-word;
      transition: color 0.2s;
    }

    .item.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .footer {
      padding: 14px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 13px;
      color: #a0aec0;
    }

    .clear-btn {
      font-size: 13px;
      color: #e53e3e;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #fff5f5; }
    .clear-btn:disabled { color: #cbd5e0; cursor: default; }
    .clear-btn:disabled:hover { background: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="stats" id="stats">항목 없음</div>
    </div>

    <div class="input-area">
      <input type="text" id="new-item" placeholder="아이템을 입력하세요..." maxlength="80" />
      <button id="add-btn" title="추가">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">미완료</button>
      <button class="filter-btn" data-filter="done">완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="footer">
      <span id="footer-count"></span>
      <button class="clear-btn" id="clear-btn">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');
    let filter = 'all';

    const listEl      = document.getElementById('list');
    const input       = document.getElementById('new-item');
    const addBtn      = document.getElementById('add-btn');
    const statsEl     = document.getElementById('stats');
    const footerCount = document.getElementById('footer-count');
    const clearBtn    = document.getElementById('clear-btn');

    function save() {
      localStorage.setItem('shopping-list', JSON.stringify(items));
    }

    function render() {
      const total   = items.length;
      const done    = items.filter(i => i.checked).length;
      const active  = total - done;

      statsEl.textContent = total === 0
        ? '항목 없음'
        : `총 ${total}개 · 완료 ${done}개 · 남은 ${active}개`;

      footerCount.textContent = active > 0 ? `${active}개 남음` : (total > 0 ? '모두 완료!' : '');

      clearBtn.disabled = done === 0;

      const visible = items.filter(i => {
        if (filter === 'active') return !i.checked;
        if (filter === 'done')   return i.checked;
        return true;
      });

      listEl.innerHTML = '';

      if (visible.length === 0) {
        listEl.innerHTML = `<li class="empty">${
          filter === 'done' ? '완료된 항목이 없습니다' :
          filter === 'active' ? '남은 항목이 없습니다' : '아이템을 추가해 보세요!'
        }</li>`;
        return;
      }

      visible.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.checked ? ' checked' : '');
        li.dataset.id = item.id;

        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''} aria-label="완료 체크">
          <span class="item-name">${escapeHtml(item.name)}</span>
          <button class="delete-btn" title="삭제">✕</button>
        `;

        li.querySelector('input').addEventListener('change', () => toggle(item.id));
        li.querySelector('.delete-btn').addEventListener('click', () => remove(item.id));

        listEl.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      items.unshift({ id: Date.now(), name, checked: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.checked = !item.checked; save(); render(); }
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    clearBtn.addEventListener('click', () => {
      items = items.filter(i => !i.checked);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
